<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="512" height="512" role="img" aria-label="Tanuj Sharma wordmark logo">
  <title>Tanuj Sharma</title>
  <desc>A modern wordmark with the name Tanuj Sharma in glowing blue on a black background.</desc>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="180" height="180" rx="16" fill="#000000"/>
  <g filter="url(#glow)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" fill="#85B7EB">
    <text x="20" y="92" font-size="38" font-weight="500" letter-spacing="-2.5">tanuj</text>
    <text x="20" y="128" font-size="38" font-weight="400" letter-spacing="-2.5">sharma</text>
  </g>
</svg>